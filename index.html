<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONScope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN TOKENS ══ */
[data-theme="dark"]{
  --bg:#0a0d12;
  --sur:#101520;
  --sur2:#141a24;
  --sur3:#182030;
  --sur4:#1c2638;
  --b1:rgba(148,183,230,.09);
  --b2:rgba(148,183,230,.15);
  --b3:rgba(148,183,230,.26);
  --tx:#c8d8ec;
  --tx2:#607898;
  --tx3:#344a62;
  --ac:#3b82f6;
  --ac2:#60a5fa;
  --ac-bg:rgba(59,130,246,.12);
  --gn:#22c55e;
  --gn-bg:rgba(34,197,94,.1);
  --am:#f59e0b;
  --am-bg:rgba(245,158,11,.1);
  --rd:#ef4444;
  --pu:#a78bfa;
  --cy:#06b6d4;
  --kc:#60a5fa;
  --ib:#0c1018;
  --thb:#0e141e;
  --rh:rgba(59,130,246,.05);
  --cb:rgba(148,183,230,.11);
  --sc:rgba(148,183,230,.13);
  --sh:rgba(0,0,0,.65);
  --d0:#3b82f6;--d1:#a78bfa;--d2:#22c55e;--d3:#f59e0b;--d4:#06b6d4;--d5:#ef4444;
  --tl:rgba(148,183,230,.16);
}
[data-theme="light"]{
  --bg:#f0f2f5;
  --sur:#ffffff;
  --sur2:#f5f7fa;
  --sur3:#eceef2;
  --sur4:#e2e6ec;
  --b1:rgba(0,0,0,.06);
  --b2:rgba(0,0,0,.11);
  --b3:rgba(0,0,0,.19);
  --tx:#1e2c40;
  --tx2:#4a647e;
  --tx3:#90a4b8;
  --ac:#2563eb;
  --ac2:#1d4ed8;
  --ac-bg:rgba(37,99,235,.08);
  --gn:#16a34a;
  --gn-bg:rgba(22,163,74,.07);
  --am:#d97706;
  --am-bg:rgba(217,119,6,.07);
  --rd:#dc2626;
  --pu:#7c3aed;
  --cy:#0891b2;
  --kc:#2563eb;
  --ib:#f0f2f5;
  --thb:#f5f7fa;
  --rh:rgba(37,99,235,.04);
  --cb:rgba(0,0,0,.08);
  --sc:rgba(0,0,0,.13);
  --sh:rgba(0,0,0,.12);
  --d0:#2563eb;--d1:#7c3aed;--d2:#16a34a;--d3:#d97706;--d4:#0891b2;--d5:#dc2626;
  --tl:rgba(0,0,0,.11);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* ══ TOPBAR ══ */
.bar{
  display:flex;align-items:center;gap:8px;
  padding:0 14px;height:48px;
  background:var(--sur);border-bottom:1px solid var(--b2);
  flex-shrink:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:4px;}
.logo-mark{
  width:28px;height:28px;
  background:linear-gradient(135deg,#3d8ef0 0%,#b97bff 100%);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 2px 12px rgba(61,142,240,.28);
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--tx);}
.logo-text em{color:var(--ac);font-style:normal;}
.vsep{width:1px;height:20px;background:var(--b2);flex-shrink:0;}

/* View toggles */
.vgrp{display:flex;background:var(--sur2);border:1px solid var(--b2);border-radius:7px;overflow:hidden;flex-shrink:0;}
.vbtn{
  padding:0 12px;height:30px;font-size:11.5px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--tx3);
  transition:all .14s;display:flex;align-items:center;gap:5px;
  white-space:nowrap;font-family:'Inter',sans-serif;
}
.vbtn.on{background:var(--ac);color:#fff;}
.vbtn:not(.on):hover{color:var(--tx2);background:var(--sur3);}

/* Search */
.srch{position:relative;flex:1;max-width:220px;min-width:80px;}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;font-size:13px;}
#bq{width:100%;background:var(--sur2);border:1px solid var(--b2);color:var(--tx);border-radius:6px;padding:5px 8px 5px 27px;font-size:12px;outline:none;transition:border-color .14s,box-shadow .14s;font-family:'Inter',sans-serif;}
#bq:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-bg);}
#bq::placeholder{color:var(--tx3);}

.fg{flex:1;}
.stat{font-size:11px;color:var(--tx2);white-space:nowrap;flex-shrink:0;font-weight:500;}
.sp{display:none;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .5s linear infinite;flex-shrink:0;}
.sp.on{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

.tb{display:flex;align-items:center;gap:4px;padding:0 11px;height:30px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:var(--sur2);color:var(--tx2);transition:all .14s;flex-shrink:0;white-space:nowrap;font-family:'Inter',sans-serif;}
.tb:hover{border-color:var(--b3);color:var(--tx);background:var(--sur3);}
.tb.g:hover{border-color:var(--gn);color:var(--gn);background:var(--gn-bg);}
.tb.ic{width:30px;padding:0;justify-content:center;font-size:16px;}

/* ══ LAYOUT ══ */
.ws{display:flex;flex:1;overflow:hidden;min-height:0;position:relative;}

/* Panels base */
.panel {
  display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 160px;
}
.panel.hide { display: none !important; }

/* Left panel (Editor) */
.lp{background:var(--sur);border-right:1px solid var(--b2);}
/* Right panels (Outputs) */
.rp{background:var(--bg);}

/* ── DRAG RESIZER ── */
.resizer{
  width:5px;
  flex-shrink:0;
  cursor:col-resize;
  background:transparent;
  position:relative;
  z-index:50;
  transition:background .15s;
}
.resizer::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:3px;height:40px;
  border-radius:2px;
  background:var(--b3);
  transition:background .15s,height .15s;
}
.resizer:hover::after,
.resizer.dragging::after{
  background:var(--ac);
  height:60px;
}

.ph{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.plbl{font-size:9.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);}
.pac{display:flex;gap:3px;}
.ib2{width:24px;height:24px;border:1px solid var(--b2);background:transparent;border-radius:5px;cursor:pointer;color:var(--tx3);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s;}
.ib2:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg);}

.ea{flex:1;position:relative;overflow:hidden;}
#ji{position:absolute;inset:0;background:transparent;border:none;outline:none;resize:none;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.75;color:var(--tx);padding:10px 12px;caret-color:var(--ac);tab-size:2;}
#ji::placeholder{color:var(--tx3);font-size:11px;}
#ji::-webkit-scrollbar{width:3px;}
#ji::-webkit-scrollbar-thumb{background:var(--sc);border-radius:2px;}

.vb{padding:6px 12px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:6px;font-size:10.5px;min-height:30px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-weight:500;}
.vd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.vb.ok .vd{background:var(--gn);box-shadow:0 0 6px var(--gn);}.vb.ok{color:var(--gn);}
.vb.er .vd{background:var(--rd);box-shadow:0 0 5px var(--rd);}.vb.er{color:var(--rd);}
.vb.id .vd{background:var(--tx3);}.vb.id{color:var(--tx3);}

.lc{padding:8px 12px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
.cr{display:flex;gap:5px;}
.ss{flex:1;background:var(--sur2);border:1px solid var(--b2);color:var(--tx2);border-radius:6px;padding:5px 7px;font-size:11.5px;outline:none;cursor:pointer;font-family:'Inter',sans-serif;}
.ss:hover,.ss:focus{border-color:var(--ac);}
.ss option{background:var(--sur2);color:var(--tx);}
.bp{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;height:32px;border-radius:6px;background:var(--ac);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .13s;font-family:'Inter',sans-serif;}
.bp:hover{filter:brightness(1.12);box-shadow:0 0 14px var(--ac-bg);}
.bs{height:32px;padding:0 10px;background:var(--sur2);border:1px solid var(--b2);color:var(--tx2);border-radius:6px;font-size:11.5px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .12s;}
.bs:hover{color:var(--tx);background:var(--sur3);}

/* scroll area */
.out{flex:1;overflow:auto;padding:14px;position:relative;}
.out::-webkit-scrollbar{width:8px;height:8px;}
.out::-webkit-scrollbar-track{background:transparent;}
.out::-webkit-scrollbar-thumb{background:var(--sc);border-radius:4px;}
.out::-webkit-scrollbar-corner{background:transparent;}

/* Empty */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:200px;text-align:center;color:var(--tx3);padding:40px;}
.ei{font-size:40px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.et{font-size:15px;font-weight:600;color:var(--tx2);}
.eh{font-size:11.5px;line-height:1.9;max-width:240px;}
kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--sur3);border:1px solid var(--b3);border-radius:3px;padding:2px 4px;color:var(--tx2);}

/* Responsive */
@media(max-width:820px){
  .ws{flex-direction:column;}
  .panel{width:100%!important;flex:none!important;height:300px;border-right:none;border-bottom:1px solid var(--b2);}
  .panel.hide{height:0!important;overflow:hidden;border:none;}
  .resizer{display:none!important;}
}
@media(max-width:560px){
  .logo-text{display:none;}
  .bar{gap:5px;padding:0 8px;}
  .tb span{display:none;}
}

/* ════════════════════════════════════════
   TABLE VIEW
════════════════════════════════════════ */
#jroot{display:inline-block;min-width:100%;}

.jt{
  border-collapse:collapse;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  background:var(--sur);
  border:1px solid var(--b2);
  border-radius:8px;
  overflow:hidden;
  table-layout:auto;
  width:100%;
}

.jt thead tr{background:var(--thb);}
.jt thead th{
  padding:7px 13px;
  text-align:left;
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--tx3);
  border-bottom:1px solid var(--b2);
  border-right:1px solid var(--cb);
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  position:sticky;top:0;z-index:10;
  transition:color .13s,background .13s;
}
.jt thead th:last-child{border-right:none;}
.jt thead th:hover{color:var(--tx2);}
.jt thead th.sa::after{content:' ↑';color:var(--ac);}
.jt thead th.sd::after{content:' ↓';color:var(--ac);}

.jt tbody tr.dr{border-bottom:1px solid var(--cb);}
.jt tbody tr.dr:last-child{border-bottom:none;}
.jt tbody tr.dr:nth-child(4n+3)>td,
.jt tbody tr.dr:nth-child(4n+4)>td{background:rgba(148,183,230,.02);}
[data-theme="light"] .jt tbody tr.dr:nth-child(4n+3)>td,
[data-theme="light"] .jt tbody tr.dr:nth-child(4n+4)>td{background:rgba(0,0,0,.015);}
.jt tbody tr.dr:hover>td{background:var(--rh)!important;}

.jt tbody td{
  padding:0;vertical-align:top;
  border-right:1px solid var(--cb);
}
.jt tbody td:last-child{border-right:none;}

.ci{
  width:36px;min-width:36px;max-width:36px;
  text-align:center;color:var(--tx3);font-size:10px;font-weight:500;
  background:var(--ib);border-right:1px solid var(--b2)!important;
  padding:8px 2px!important;user-select:none;white-space:nowrap;vertical-align:top;
}

.ck{
  padding:8px 13px!important;
  white-space:nowrap;font-weight:600;
  color:var(--kc);
  border-right:1px solid var(--b2)!important;
  vertical-align:top;font-size:11.5px;
}
.cv{padding:8px 12px!important;vertical-align:top;}

.vs{color:var(--gn);}
.vn{color:var(--am);}
.vb2{color:var(--pu);}
.vnil{color:var(--tx3);font-style:italic;}
.vurl{color:var(--cy);text-decoration:underline dotted;cursor:pointer;}
.vurl:hover{color:var(--ac2);}

.ts-wrap{display:inline;white-space:nowrap;}
.ts-btn{
  display:inline-block;margin-left:4px;font-size:10px;
  color:var(--tx3);background:var(--sur3);border:1px solid var(--cb);
  border-radius:3px;padding:0 5px;cursor:pointer;
  vertical-align:middle;white-space:nowrap;font-family:'Inter',sans-serif;
  line-height:17px;transition:all .12s;font-weight:500;
}
.ts-btn:hover{color:var(--ac);border-color:var(--ac);background:var(--ac-bg);}

.pills{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.pill{
  display:inline-flex;align-items:center;padding:1px 7px;
  border-radius:3px;background:transparent;border:1px solid var(--cb);
  font-size:11px;font-family:'JetBrains Mono',monospace;white-space:nowrap;
}
.eb{font-size:10.5px;color:var(--tx3);font-family:'JetBrains Mono',monospace;}

.td-nested{
  padding:0!important;
  vertical-align:top;
}

.jt-nested{
  border-collapse:collapse;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  table-layout:auto;
  width:100%;
  background:transparent;
}
.jt-nested thead th{
  background:var(--thb);
  padding:5px 11px;
  text-align:left;
  font-size:8.5px;
  font-weight:700;
  letter-spacing:.9px;
  text-transform:uppercase;
  color:var(--tx3);
  border-bottom:1px solid var(--cb);
  border-right:1px solid var(--cb);
  white-space:nowrap;
  user-select:none;
}
.jt-nested thead th:last-child{border-right:none;}
.jt-nested tbody tr{border-bottom:1px solid var(--cb);}
.jt-nested tbody tr:last-child{border-bottom:none;}
.jt-nested tbody tr:hover>td{background:var(--rh)!important;}
.jt-nested tbody td{
  padding:6px 11px;
  vertical-align:top;
  border-right:1px solid var(--cb);
}
.jt-nested tbody td:last-child{border-right:none;}
.jt-nested .ck{
  padding:6px 11px!important;
  white-space:nowrap;font-weight:600;
  color:var(--kc);
  border-right:1px solid var(--b2)!important;
  font-size:11px;
}
.jt-nested .ci{
  width:28px;min-width:28px;max-width:28px;
  text-align:center;color:var(--tx3);font-size:9.5px;font-weight:500;
  background:var(--ib);border-right:1px solid var(--b2)!important;
  padding:6px 2px!important;user-select:none;white-space:nowrap;vertical-align:top;
}

.jt-nested .jt-nested thead th{font-size:8px;padding:4px 9px;}
.jt-nested .jt-nested .ck{padding:5px 9px!important;font-size:10.5px;}
.jt-nested .jt-nested tbody td{padding:5px 9px;font-size:11px;}
.jt-nested .jt-nested .ci{width:24px;min-width:24px;max-width:24px;padding:5px 2px!important;font-size:9px;}

/* ════════════════════════════════════════
   TREE VIEW
════════════════════════════════════════ */
#tree-root{
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;
  line-height:1;
  padding:4px 0;
  min-width:max-content;
}

.tn{display:flex;flex-direction:column;}

.tn-row{
  display:flex;
  align-items:center;
  gap:0;
  padding:2.5px 4px;
  cursor:default;
  border-radius:3px;
}
.tn-row:hover{background:var(--rh);}

.tn-children{
  padding-left:16px;
  position:relative;
}
.tn-children::before{
  content:'';position:absolute;
  left:7px;top:0;bottom:2px;
  width:1px;background:var(--tl);
}

.tn-arrow{
  width:16px;height:16px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--tx3);
  cursor:pointer;flex-shrink:0;
  transition:transform .15s,color .12s;
  user-select:none;
}
.tn-arrow:hover{color:var(--ac);}
.tn-arrow.open{transform:rotate(90deg);}
.tn-arrow.leaf{cursor:default;opacity:0;}

.tn-key{color:var(--kc);font-weight:500;font-size:12px;flex-shrink:0;}
.tn-idx{color:var(--am);font-size:11.5px;font-weight:500;}
.tn-colon{color:var(--tx3);margin:0 3px;font-weight:400;}
.tn-type{font-size:9.5px;color:var(--tx3);margin-left:5px;font-weight:400;}

.tn-summary{
  color:var(--tx3);font-size:11px;font-weight:400;margin-left:3px;
  cursor:pointer;
}
.tn-summary:hover{color:var(--tx2);}

.tn .vs{color:var(--gn);}
.tn .vn{color:var(--am);}
.tn .vb2{color:var(--pu);}
.tn .vnil{color:var(--tx3);font-style:italic;}
.tn .vurl{color:var(--cy);cursor:pointer;}

mark{background:rgba(245,158,11,.22);color:var(--am);border-radius:2px;padding:0 1px;}

#tip{
  position:fixed;z-index:8000;
  background:var(--sur2);border:1px solid var(--b3);
  color:var(--tx);padding:8px 12px;border-radius:8px;font-size:11.5px;
  max-width:480px;word-break:break-all;white-space:pre-wrap;
  box-shadow:0 8px 32px var(--sh);line-height:1.6;
  pointer-events:none;font-family:'JetBrains Mono',monospace;display:none;
}

.toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--sur3);border:1px solid var(--b3);
  color:var(--tx);padding:7px 16px;border-radius:8px;
  font-size:12px;font-weight:500;z-index:9999;
  transition:transform .26s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 24px var(--sh);
}
.toast.sh{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="bar">
  <div class="logo">
    <div class="logo-mark">⬡</div>
    <span class="logo-text">JSON<em>Scope</em></span>
  </div>
  <div class="vsep"></div>

  <div class="vgrp">
    <button class="vbtn on" id="v-json" onclick="togglePanel('json',this)" title="JSON Editör">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6l2 2-2 2M9 10h2"/></svg>JSON
    </button>
    <button class="vbtn" id="v-table" onclick="togglePanel('table',this)" title="Tablo">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 7h12M6 3v10"/></svg>Table
    </button>
    <button class="vbtn" id="v-tree" onclick="togglePanel('tree',this)" title="Ağaç">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 3h4v4H3zM3 9h4v4H3z"/><path d="M7 5h3M7 11h3M10 5v6"/></svg>Tree
    </button>
  </div>

  <div class="vsep"></div>

  <div class="srch">
    <span class="si">⌕</span>
    <input id="bq" type="text" placeholder="Filter…" oninput="doFilter(this.value)">
  </div>

  <span class="stat" id="stat">—</span>
  <div class="fg"></div>
  <div class="sp" id="sp"></div>
  <button class="tb ic" id="thb" onclick="toggleTheme()" title="Theme">🌙</button>
  <button class="tb" onclick="copyAll()">⧉ <span>Copy JSON</span></button>
  <button class="tb g" onclick="exportCSV()">↓ <span>CSV</span></button>
  <button class="tb g" onclick="exportJSON()">↓ <span>JSON</span></button>
</div>

<!-- WORKSPACE -->
<div class="ws" id="ws">
  
  <!-- LEFT: Editor -->
  <div class="panel lp" id="p-json">
    <div class="ph">
      <span class="plbl">JSON Input</span>
      <div class="pac">
        <button class="ib2" title="Format (Ctrl+Shift+F)" onclick="fmtJSON()">{ }</button>

",description:"Amazon.com.tr",amount:-2349,currency:"TRY",category:"shopping",status:"completed"}],meta:{dataVersion:"v3.2",generatedBy:"customer-profile-service",region:"eu-west-1",processingMs:47,cacheHit:false}},

/* ════════════════════
   VALIDATE
════════════════════ */
function validate(){
  const raw=document.getElementById('ji').value.trim();
  const bar=document.getElementById('vb'),msg=document.getElementById('vm');
  if(!raw){bar.className='vb id';msg.textContent='Bekleniyor…';return null;}
  try{
    const p=JSON.parse(raw);bar.className='vb ok';
    const t=Array.isArray(p)?`Array[${p.length}]`:p&&typeof p==='object'?`Object{${Object.keys(p).length}}`:typeof p;
    msg.textContent=`✓ ${t}`;return p;
  }catch(e){bar.className='vb er';msg.textContent=`✗ ${e.message.slice(0,50)}`;return null;}
}
document.getElementById('ji').addEventListener('input',validate);

/* ════════════════════
   PANEL TOGGLES
════════════════════ */
function togglePanel(panel, btn) {
  activePanels[panel] = !activePanels[panel];
  
  if (activePanels[panel]) btn.classList.add('on');
  else btn.classList.remove('on');
  
  const pEl = document.getElementById('p-' + panel);
  if (activePanels[panel]) {
     pEl.classList.remove('hide');
     // Reset flex on all to ensure they share layout equally
     ['json', 'table', 'tree'].forEach(k => {
        const el = document.getElementById('p-' + k);
        el.style.flex = '';
        el.style.width = '';
     });
  } else {
     pEl.classList.add('hide');
  }
  
  // Render immediately if it has data
  if (activePanels[panel] && DATA) {
     if (panel === 'table') {
        document.getElementById('emp-table').style.display = 'none';
        showTable();
     }
     if (panel === 'tree') {
        document.getElementById('emp-tree').style.display = 'none';
        showTree();
     }
  }
  
  updateLayout();
}

function updateLayout() {
   const pJson = activePanels.json;
   const pTable = activePanels.table;
   const pTree = activePanels.tree;
   
   document.getElementById('r-1').style.display = (pJson && (pTable || pTree)) ? '' : 'none';
   document.getElementById('r-2').style.display = (pTable && pTree) ? '' : 'none';
}

/* ════════════════════
   THEME
════════════════════ */
function toggleTheme(){
  const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('thb').textContent=d?'🌙':'☀️';
  localStorage.setItem('jst',d?'light':'dark');
}
(()=>{const s=localStorage.getItem('jst');if(s){document.documentElement.setAttribute('data-theme',s);document.getElementById('thb').textContent=s==='light'?'🌙':'☀️';}})();

/* ════════════════════
   CONTROLS
════════════════════ */
function fmtJSON(){try{const v=JSON.parse(document.getElementById('ji').value);document.getElementById('ji').value=JSON.stringify(v,null,2);validate();toast('Formatlandı ✓');}catch{toast('Geçersiz JSON!');}}
function clearAll(){document.getElementById('ji').value='';validate();clrOut();}
function copyAll(){if(!DATA){toast('Önce render edin');return;}navigator.clipboard.writeText(JSON.stringify(DATA,null,2));toast('Kopyalandı ✓');}
function loadFile(e){const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=ev=>{document.getElementById('ji').value=ev.target.result;validate();render();};fr.readAsText(f);e.target.value='';}
function loadSmp(k){if(!k)return;document.getElementById('ji').value=JSON.stringify(S[k],null,2);validate();render();}

/* ════════════════════
   RENDER ENTRY
════════════════════ */
function render(){
  const raw=document.getElementById('ji').value.trim();
  if(!raw){clrOut();return;}
  const p=validate();if(!p)return;
  DATA=p;
  document.getElementById('sp').classList.add('on');
  
  if(document.getElementById('emp-table')) document.getElementById('emp-table').style.display='none';
  if(document.getElementById('emp-tree')) document.getElementById('emp-tree').style.display='none';
  
  setTimeout(()=>{
    try{
      if(activePanels.table) showTable();
      if(activePanels.tree) showTree();
      updStat(DATA);
      const q=document.getElementById('bq').value;if(q)doFilter(q);
    }catch(e){toast('Hata: '+e.message);console.error(e);}
    document.getElementById('sp').classList.remove('on');
  },10);
}

function clrOut(){
  const tr = document.getElementById('jroot'); if(tr) { tr.innerHTML=''; tr.style.display='none'; }
  const tree = document.getElementById('tree-root'); if(tree) { tree.innerHTML=''; tree.style.display='none'; }
  if(document.getElementById('emp-table')) document.getElementById('emp-table').style.display='flex';
  if(document.getElementById('emp-tree')) document.getElementById('emp-tree').style.display='flex';
  document.getElementById('stat').textContent='—';DATA=null;
}

/* ════════════════════════════════════════
   TABLE RENDERER
════════════════════════════════════════ */
function showTable(){
  const r=document.getElementById('jroot');
  r.innerHTML='';
  if(!DATA) return;
  r.appendChild(rVal(DATA,0));
  r.style.display='';
}

function rVal(v,d){
  if(v===null||v===undefined) return mks('vnil',v===null?'null':'—');
  if(typeof v==='boolean')    return mks('vb2',String(v));
  if(typeof v==='number')     return mks('vn',String(v));
  if(typeof v==='string')     return rStr(v);
  if(Array.isArray(v))        return rArr(v,d);
  if(typeof v==='object')     return rObj(v,d);
  return mks('',String(v));
}

function rStr(v){
  const isUrl=/^https?:\/\//.test(v);
  const cls=isUrl?'vurl':'vs';
  if(v.length<=TRUNC){
    const s=mks(cls,v);
    if(isUrl){s.style.cursor='pointer';s.onclick=()=>window.open(v,'_blank');}
    return s;
  }
  const w=mk('span','ts-wrap');
  const txt=mks(cls,v.slice(0,TRUNC));
  if(isUrl){txt.style.cursor='pointer';txt.onclick=()=>window.open(v,'_blank');}
  const btn=mk('span','ts-btn');
  btn.textContent=`+${v.length-TRUNC}`;btn.dataset.exp='0';
  btn.onclick=e=>{
    e.stopPropagation();const exp=btn.dataset.exp==='1';
    txt.textContent=exp?v.slice(0,TRUNC):v;
    btn.textContent=exp?`+${v.length-TRUNC}`:'▲';
    btn.dataset.exp=exp?'0':'1';if(exp)showTip('');
  };
  w.dataset.tip=v.length>500?v.slice(0,500)+'…':v;
  w.addEventListener('mouseenter',()=>showTip(w.dataset.tip));
  w.addEventListener('mouseleave',()=>showTip(''));
  w.appendChild(txt);w.appendChild(btn);return w;
}

function rObj(obj,d){
  const entries=Object.entries(obj);
  if(!entries.length) return mks('eb','{}');

  const tbl=mk('table', d===0?'jt':'jt-nested');
  const maxK=Math.max(...entries.map(([k])=>k.length));
  const kw=Math.min(maxK*7.5+24,190);
  const cg=mk('colgroup');
  const ck=mk('col');ck.style.width=kw+'px';
  cg.appendChild(ck);cg.appendChild(mk('col'));
  tbl.appendChild(cg);

  const tb=mk('tbody');
  entries.forEach(([k,v])=>{
    const isComplex=v!==null&&typeof v==='object';
    const tr=mk('tr','dr');
    const tdK=mk('td','ck');tdK.textContent=k;

    if(!isComplex){
      const tdV=mk('td','cv');tdV.appendChild(rVal(v,d+1));
      tr.appendChild(tdK);tr.appendChild(tdV);tb.appendChild(tr);
      return;
    }

    const tdV=mk('td','td-nested');
    tdV.appendChild(rValNested(v,d+1));
    tr.appendChild(tdK);tr.appendChild(tdV);tb.appendChild(tr);
  });

  tbl.appendChild(tb);
  return tbl;
}

function rValNested(v,d){
  if(v===null||v===undefined) return mks('vnil',v===null?'null':'—');
  if(typeof v==='boolean')    return mks('vb2',String(v));
  if(typeof v==='number')     return mks('vn',String(v));
  if(typeof v==='string')     return rStr(v);
  if(Array.isArray(v))        return rArrNested(v,d);
  if(typeof v==='object')     return rObjNested(v,d);
  return mks('',String(v));
}

function rObjNested(obj,d){
  const entries=Object.entries(obj);
  if(!entries.length) return mks('eb','{}');
  const tbl=mk('table','jt-nested');
  const maxK=Math.max(...entries.map(([k])=>k.length));
  const kw=Math.min(maxK*7.5+20,180);
  const cg=mk('colgroup');
  const c=mk('col');c.style.width=kw+'px';
  cg.appendChild(c);cg.appendChild(mk('col'));tbl.appendChild(cg);
  const tb=mk('tbody');
  entries.forEach(([k,v])=>{
    const isComplex=v!==null&&typeof v==='object';
    const tr=mk('tr','dr');
    const tdK=mk('td','ck');tdK.textContent=k;
    const tdV=isComplex?mk('td','td-nested'):mk('td','cv');
    if(isComplex) tdV.appendChild(rValNested(v,d+1));
    else tdV.appendChild(rValNested(v,d+1));
    tr.appendChild(tdK);tr.appendChild(tdV);tb.appendChild(tr);
  });
  tbl.appendChild(tb);return tbl;
}

function rArrNested(arr,d){
  if(!arr.length) return mks('eb','[]');
  const allPrim=arr.every(x=>x===null||typeof x!=='object');
  if(allPrim&&arr.length<=24) return rPrimArr(arr);
  const tbl=mk('table','jt-nested');
  const cg=mk('colgroup');
  const ic=mk('col');ic.style.cssText='width:28px;min-width:28px;';cg.appendChild(ic);
  cg.appendChild(mk('col'));tbl.appendChild(cg);
  const allObj=arr.every(x=>x&&typeof x==='object'&&!Array.isArray(x));
  if(allObj){
    const ks=new Set();arr.forEach(o=>Object.keys(o).forEach(k=>ks.add(k)));
    const keys=[...ks];
    const thead=mk('thead'),hr=mk('tr');
    const it=mk('th');it.style.cssText='width:28px;text-align:center;cursor:default;';it.textContent='#';hr.appendChild(it);
    keys.forEach(k=>{const h=mk('th');h.textContent=k;hr.appendChild(h);});
    thead.appendChild(hr);tbl.appendChild(thead);
    const tb=mk('tbody');
    arr.forEach((row,ri)=>{
      const tr=mk('tr','dr');
      const ti=mk('td','ci');ti.textContent=ri+1;tr.appendChild(ti);
      keys.forEach(k=>{
        const v=row[k];
        const isComplex=v!==null&&typeof v==='object';
        const td=isComplex?mk('td','td-nested'):mk('td','cv');
        td.appendChild(rValNested(v,d+1));
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
  } else {
    const tb=mk('tbody');
    arr.forEach((x,i)=>{
      const tr=mk('tr','dr');
      const ti=mk('td','ci');ti.textContent=i+1;
      const isComplex=x!==null&&typeof x==='object';
      const tv=isComplex?mk('td','td-nested'):mk('td','cv');
      tv.appendChild(rValNested(x,d+1));
      tr.appendChild(ti);tr.appendChild(tv);tb.appendChild(tr);
    });
    tbl.appendChild(tb);
  }
  return tbl;
}

function rArr(arr,d){
  if(!arr.length) return mks('eb','[]');
  const allPrim=arr.every(x=>x===null||typeof x!=='object');
  if(allPrim) return rPrimArr(arr);
  const allObj=arr.every(x=>x&&typeof x==='object'&&!Array.isArray(x));
  if(allObj) return rObjArr(arr,d);
  return rMixArr(arr,d);
}

function rPrimArr(arr){
  if(arr.length<=24){
    const row=mk('div','pills');
    arr.forEach(x=>{
      const p=mk('span','pill');
      p.appendChild(mks(x===null?'vnil':typeof x==='number'?'vn':typeof x==='boolean'?'vb2':'vs',String(x??'null')));
      row.appendChild(p);
    });
    return row;
  }
  return rSingleCol(arr,d);
}

function rObjArr(arr,d){
  const ks=new Set();arr.forEach(o=>Object.keys(o).forEach(k=>ks.add(k)));
  const keys=[...ks];
  const sk=`s${d}_${keys.join()}`;
  const isComplexK=k=>arr.some(r=>{const v=r[k];return v!==null&&typeof v==='object';});
  const complexCols=new Set(keys.filter(isComplexK));

  function colW(k){
    if(complexCols.has(k))return null;
    const h=k.length*7.5+24;let m=0;
    arr.forEach(r=>{const v=r[k];
      if(v==null){m=Math.max(m,28);}
      else if(typeof v==='boolean'){m=Math.max(m,40);}
      else if(typeof v==='number'){m=Math.max(m,String(v).length*7.2+4);}
      else{m=Math.max(m,Math.min(String(v).length,TRUNC)*7.2+4);}
    });
    return Math.min(Math.max(h,m+24),260);
  }

  const tbl=mk('table','jt');
  const cg=mk('colgroup');
  const ic=mk('col');ic.style.cssText='width:36px;min-width:36px;';cg.appendChild(ic);
  keys.forEach(k=>{const c=mk('col');const w=colW(k);if(w)c.style.width=w+'px';cg.appendChild(c);});
  tbl.appendChild(cg);

  const thead=mk('thead'),hr=mk('tr');
  const it=mk('th');it.style.cssText='width:36px;text-align:center;cursor:default;';it.textContent='#';hr.appendChild(it);
  keys.forEach(k=>{
    const h=mk('th');h.textContent=k;h.dataset.k=k;
    h.onclick=()=>{
      const cur=_sort[sk];_sort[sk]=cur===k+'a'?k+'d':k+'a';
      const asc=_sort[sk].endsWith('a');
      tbl.querySelectorAll('thead th').forEach(t=>t.classList.remove('sa','sd'));
      h.classList.add(asc?'sa':'sd');
      const sorted=[...arr].sort((a,b)=>{const av=a[k],bv=b[k];if(av==null)return 1;if(bv==null)return -1;if(typeof av==='number'&&typeof bv==='number')return(av-bv)*(asc?1:-1);return String(av).localeCompare(String(bv))*(asc?1:-1);});
      tbl.replaceChild(buildObjRows(sorted,keys,complexCols,d),tbl.querySelector('tbody'));
      const q=document.getElementById('bq').value;if(q)doFilter(q);
    };
    hr.appendChild(h);
  });
  thead.appendChild(hr);tbl.appendChild(thead);
  tbl.appendChild(buildObjRows(arr,keys,complexCols,d));
  return tbl;
}

function buildObjRows(arr,keys,complexCols,d){
  const tb=mk('tbody');
  arr.forEach((row,ri)=>{
    const tr=mk('tr','dr');
    const ti=mk('td','ci');ti.textContent=ri+1;tr.appendChild(ti);
    keys.forEach(k=>{
      const v=row[k];
      const isComplex=v!==null&&typeof v==='object';
      const td=isComplex?mk('td','td-nested'):mk('td','cv');
      td.appendChild(isComplex?rValNested(v,d+1):rVal(v,d+1));
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  return tb;
}

function rSingleCol(arr,d){
  const tbl=mk('table','jt');
  const cg=mk('colgroup');const ic=mk('col');ic.style.cssText='width:36px;min-width:36px;';cg.appendChild(ic);cg.appendChild(mk('col'));tbl.appendChild(cg);
  tbl.innerHTML+='<thead><tr><th style="width:36px;text-align:center;cursor:default">#</th><th>value</th></tr></thead>';
  const tb=mk('tbody');
  arr.forEach((x,i)=>{
    const tr=mk('tr','dr');const ti=mk('td','ci');ti.textContent=i+1;
    const isComplex=x!==null&&typeof x==='object';
    const tv=isComplex?mk('td','td-nested'):mk('td','cv');
    tv.appendChild(isComplex?rValNested(x,d+1):rVal(x,d+1));
    tr.appendChild(ti);tr.appendChild(tv);tb.appendChild(tr);
  });
  tbl.appendChild(tb);return tbl;
}

function rMixArr(arr,d){
  const tbl=mk('table','jt');
  const cg=mk('colgroup');const ic=mk('col');ic.style.cssText='width:36px;min-width:36px;';cg.appendChild(ic);cg.appendChild(mk('col'));tbl.appendChild(cg);
  tbl.innerHTML+='<thead><tr><th style="width:36px;text-align:center;cursor:default">#</th><th>value</th></tr></thead>';
  const tb=mk('tbody');
  arr.forEach((x,i)=>{
    const tr=mk('tr','dr');const ti=mk('td','ci');ti.textContent=i+1;
    const isComplex=x!==null&&typeof x==='object';
    const tv=isComplex?mk('td','td-nested'):mk('td','cv');
    tv.appendChild(isComplex?rValNested(x,d+1):rVal(x,d+1));
    tr.appendChild(ti);tr.appendChild(tv);tb.appendChild(tr);
  });
  tbl.appendChild(tb);return tbl;
}

/* ════════════════════════════════════════
   TREE RENDERER
════════════════════════════════════════ */
function showTree(){
  const r=document.getElementById('tree-root');
  r.innerHTML='';
  if(!DATA) return;
  r.style.display='block';
  r.appendChild(buildTreeNode(DATA,null,null,true));
}

function buildTreeNode(val,key,idx,startOpen){
  const node=mk('div','tn');
  const isComplex=val!==null&&typeof val==='object';
  const isArr=Array.isArray(val);

  const row=mk('div','tn-row');

  const arrow=mk('span','tn-arrow'+(isComplex?' ':'  leaf'));
  arrow.textContent='▶';
  row.appendChild(arrow);

  if(key!==null){
    const k=mk('span','tn-key');k.textContent=key;row.appendChild(k);
    const col=mk('span','tn-colon');col.textContent=':';row.appendChild(col);
  } else if(idx!==null){
    const k=mk('span','tn-idx');k.textContent=idx;row.appendChild(k);
    const col=mk('span','tn-colon');col.textContent=':';row.appendChild(col);
  }

  if(!isComplex){
    row.appendChild(treeVal(val));
    arrow.classList.add('leaf');
    node.appendChild(row);
    return node;
  }

  const summary=mk('span','tn-summary');
  const count=isArr?val.length:Object.keys(val).length;
  summary.textContent=isArr?`[${count}]`:`{${count}}`;
  row.appendChild(summary);

  const tb2=mk('span','tn-type');tb2.textContent=isArr?'array':'object';
  row.appendChild(tb2);

  const children=mk('div','tn-children');
  let built=false;
  let open=!!startOpen;

  function buildChildren(){
    if(built)return;built=true;
    if(isArr){
      val.forEach((v,i)=>children.appendChild(buildTreeNode(v,null,i,false)));
    }else{
      Object.entries(val).forEach(([k,v])=>children.appendChild(buildTreeNode(v,k,null,false)));
    }
  }

  function toggle(){
    open=!open;
    arrow.classList.toggle('open',open);
    summary.style.display=open?'none':'';
    children.style.display=open?'':'none';
    if(open)buildChildren();
  }

  arrow.onclick=toggle;
  summary.onclick=toggle;
  row.ondblclick=toggle;

  if(open){
    buildChildren();
    arrow.classList.add('open');
    summary.style.display='none';
  }else{
    children.style.display='none';
  }

  node.appendChild(row);
  node.appendChild(children);
  return node;
}

function treeVal(v){
  if(v===null||v===undefined) return mks('vnil',v===null?'null':'—');
  if(typeof v==='boolean') return mks('vb2',String(v));
  if(typeof v==='number')  return mks('vn',String(v));
  if(typeof v==='string'){
    const isUrl=/^https?:\/\//.test(v);
    const display=v.length>80?v.slice(0,80)+'…':v;
    const s=mks(isUrl?'vurl':'vs',isUrl?display:'"'+display+'"');
    if(isUrl){s.style.cursor='pointer';s.title=v;s.onclick=()=>window.open(v,'_blank');}
    return s;
  }
  return mks('vnil','—');
}

const tipEl=document.getElementById('tip');
function showTip(t){if(!t){tipEl.style.display='none';return;}tipEl.textContent=t;tipEl.style.display='block';}
document.addEventListener('mousemove',e=>{
  if(tipEl.style.display==='none')return;
  const pad=14,tw=tipEl.offsetWidth||300,th2=tipEl.offsetHeight||60;
  let x=e.clientX+pad,y=e.clientY+pad;
  if(x+tw>window.innerWidth-8)x=e.clientX-tw-pad;
  if(y+th2>window.innerHeight-8)y=e.clientY-th2-pad;
  tipEl.style.left=Math.max(8,x)+'px';tipEl.style.top=Math.max(8,y)+'px';
});

/* ════════════════════
   FILTER
════════════════════ */
function doFilter(q){
  const tRoot=document.getElementById('jroot');
  const trRoot=document.getElementById('tree-root');
  const t=q.toLowerCase().trim();

  if(activePanels.table && tRoot){
    tRoot.querySelectorAll('mark').forEach(m=>m.replaceWith(document.createTextNode(m.textContent)));
    tRoot.querySelectorAll('tbody tr.dr').forEach(tr=>{tr.style.display=!t||tr.textContent.toLowerCase().includes(t)?'':'none';});
    if(t)walkNodes(tRoot,t);
  }
  if(activePanels.tree && trRoot){
    trRoot.querySelectorAll('mark').forEach(m=>m.replaceWith(document.createTextNode(m.textContent)));
    if(t)walkNodes(trRoot,t);
    if(t){
      trRoot.querySelectorAll('.tn-row').forEach(row=>{
        if(row.textContent.toLowerCase().includes(t)){
          let p=row.closest('.tn')?.parentElement?.closest('.tn');
          while(p){
            const arr2=p.querySelector(':scope>.tn-row>.tn-arrow');
            const chld=p.querySelector(':scope>.tn-children');
            if(arr2&&chld&&chld.style.display==='none'){arr2.classList.add('open');chld.style.display='';}
            p=p.parentElement?.closest('.tn');
          }
        }
      });
    }
  }
  updStat(DATA,t);
}
function walkNodes(node,t){
  if(node.nodeType===3){const tx=node.textContent,l=tx.toLowerCase();if(l.includes(t)){const i=l.indexOf(t),s=document.createElement('span');s.innerHTML=esc(tx.slice(0,i))+'<mark>'+esc(tx.slice(i,i+t.length))+'</mark>'+esc(tx.slice(i+t.length));node.parentNode.replaceChild(s,node);}}
  else if(node.nodeType===1&&!['SCRIPT','STYLE','MARK','BUTTON','TEXTAREA'].includes(node.tagName)){[...node.childNodes].forEach(c=>walkNodes(c,t));}
}

/* ════════════════════
   HELPERS
════════════════════ */
function mk(t,c){const e=document.createElement(t||'div');if(c)e.className=c;return e;}
function mks(c,t){const s=mk('span',c);s.textContent=t;return s;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updStat(p,f){
  let t='';
  if(f&&activePanels.table){const v=document.querySelectorAll('#jroot tbody tr.dr:not([style*="none"])').length;t=`${v} row`;}
  else if(!p)t='—';
  else if(Array.isArray(p))t=`${p.length} items`;
  else if(p&&typeof p==='object')t=`${Object.keys(p).length} keys`;
  else t=typeof p;
  document.getElementById('stat').textContent=t;
}
let _tt;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('sh');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('sh'),2200);}

/* ════════════════════
   DRAG RESIZERS
════════════════════ */
(function initResizers(){
  document.querySelectorAll('.resizer').forEach(rs => {
    let dragging = false, startX = 0, startW = 0, prevPanel;
    
    function getPrev() {
       let p = rs.previousElementSibling;
       while(p && p.classList.contains('hide')) {
         p = p.previousElementSibling;
       }
       return p;
    }

    function startDrag(x) {
       prevPanel = getPrev();
       if(!prevPanel) return;
       dragging = true;
       startX = x;
       startW = prevPanel.getBoundingClientRect().width;
       rs.classList.add('dragging');
       document.body.style.cursor = 'col-resize';
       document.body.style.userSelect = 'none';
    }
    
    rs.addEventListener('mousedown', e => {
       startDrag(e.clientX);
       e.preventDefault();
    });
    rs.addEventListener('touchstart', e => {
       startDrag(e.touches[0].clientX);
    }, {passive:true});
    
    document.addEventListener('mousemove', e => {
       if(!dragging || !prevPanel) return;
       const newW = Math.max(140, startW + (e.clientX - startX));
       prevPanel.style.flex = `0 0 ${newW}px`;
       prevPanel.style.width = `${newW}px`;
    });
    document.addEventListener('touchmove', e => {
       if(!dragging || !prevPanel) return;
       const newW = Math.max(140, startW + (e.touches[0].clientX - startX));
       prevPanel.style.flex = `0 0 ${newW}px`;
       prevPanel.style.width = `${newW}px`;
    });
    
    const endDrag = () => {
       dragging = false;
       if(rs) rs.classList.remove('dragging');
       document.body.style.cursor = '';
       document.body.style.userSelect = '';
    };
    
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);
  });
})();
